<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lecteur en Ligne - IMSA IntelliBook</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link href="css/style.css" rel="stylesheet" />
  <link href="css/reader.css" rel="stylesheet" />
</head>

<body>
  <!-- NAVBAR minimal -->
  <nav class="navbar fixed-top navbar-light bg-white">
    <div class="container d-flex align-items-center justify-content-between">
      <a id="backToBookLink" class="text-decoration-none fw-bold text-blue-dark" href="#">
        <i class="fa-solid fa-arrow-left text-orange me-2"></i>Retour au livre
      </a>
      <div class="d-flex align-items-center gap-2">
        <select id="fontSizeSelect" class="form-select form-select-sm" style="width: 130px;">
          <option value="1">Texte 100%</option>
          <option value="0.9">Texte 90%</option>
          <option value="1.1">Texte 110%</option>
          <option value="1.25">Texte 125%</option>
        </select>
        <button id="nightModeBtn" class="btn btn-blue-dark btn-sm rounded-pill px-3" type="button" aria-label="Mode nuit">
          <i class="fa-solid fa-moon"></i> Mode nuit
        </button>
        <div class="d-flex align-items-center ms-1">
          <div id="readerUserAvatar" class="testi-avatar" style="width:36px;height:36px;font-size:12px;"></div>
        </div>
      </div>
    </div>
  </nav>

  <div class="reader-progress">
    <div class="bar" id="readerProgressBar"></div>
  </div>

  <div class="reader-layout">
    <!-- SIDEBAR -->
    <aside class="reader-sidebar">
      <div class="d-flex gap-3 align-items-start">
        <div id="readerBookCoverContainer" class="book-cover-container cover-romans" style="width:72px;border-radius:14px;overflow:hidden;">
          <img
            id="readerBookCoverImg"
            class="book-cover-img"
            src=""
            alt="Couverture"
            loading="lazy"
            onload="this.classList.add('loaded')"
            onerror="this.style.display='none'"
          />
          <div class="book-cover-fallback">
            <i class="fa-solid fa-book cover-icon"></i>
            <div class="cover-title" id="readerBookCoverFallbackTitle">—</div>
            <div class="cover-author" id="readerBookCoverFallbackAuthor">—</div>
          </div>
        </div>
        <div>
          <div id="readerBookTitle" class="fw-bold"></div>
          <div id="readerBookAuthor" class="text-muted small"></div>
        </div>
      </div>

      <hr />
      <div class="d-flex align-items-center justify-content-between mb-2">
        <div class="fw-bold">Pages</div>
        <div class="text-muted small" id="readerPageCountInfo"></div>
      </div>

      <div class="list-group list-group-flush" id="pageList"></div>
    </aside>

    <!-- CONTENT -->
    <section class="reader-content">
      <div class="reader-canvas-wrap">
        <div id="pdfViewer" data-book-id="" class="w-100">
          <canvas id="pdfCanvas"></canvas>
        </div>
      </div>

      <div class="d-flex align-items-center justify-content-center mt-3 text-muted small">
        <button id="prevPageBtn" class="btn btn-orange-outline btn-sm rounded-pill px-3" type="button" aria-label="Page précédente">← Page précédente</button>
        <span class="mx-3 fw-bold text-orange" id="pageIndicator">Page 1 / 1</span>
        <button id="nextPageBtn" class="btn btn-orange-outline btn-sm rounded-pill px-3" type="button" aria-label="Page suivante">Page suivante →</button>
      </div>
    </section>
  </div>

  <!-- READING TOOLBAR (bottom) -->
  <div class="reader-toolbar">
    <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-2">
      <div class="d-flex align-items-center gap-2">
        <button type="button" class="btn btn-orange-outline btn-sm rounded-pill px-3" id="toolbarPrevBtn" data-action="prev-page">← Préc.</button>
        <div class="fw-bold text-orange small" id="toolbarPageText">Page 1 / 1</div>
        <button type="button" class="btn btn-orange-outline btn-sm rounded-pill px-3" id="toolbarNextBtn" data-action="next-page">Suiv. →</button>
      </div>

      <div class="d-flex align-items-center gap-2">
        <div class="btn-group" role="group" aria-label="Zoom">
          <button type="button" class="btn btn-blue-dark btn-sm" data-action="zoom" data-zoom="0.75">75%</button>
          <button type="button" class="btn btn-blue-dark btn-sm" data-action="zoom" data-zoom="1">100%</button>
          <button type="button" class="btn btn-blue-dark btn-sm" data-action="zoom" data-zoom="1.25">125%</button>
          <button type="button" class="btn btn-blue-dark btn-sm" data-action="zoom" data-zoom="1.5">150%</button>
        </div>

        <button type="button" id="toolbarNightBtn" class="btn btn-orange-outline btn-sm rounded-pill px-3" data-action="night-mode" aria-label="Mode nuit">
          <i class="fa-solid fa-moon"></i> Mode nuit
        </button>

        <button type="button" class="btn btn-orange-outline btn-sm rounded-pill px-3" data-action="bookmark" aria-label="Marque-page" id="bookmarkBtn">🔖 Marque-page</button>

        <button type="button" class="btn btn-orange btn-sm rounded-pill px-3" data-action="download" aria-label="Télécharger" id="downloadBtn">↓ Télécharger</button>
      </div>
    </div>
  </div>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script src="js/data.js"></script>
  <script src="js/reader.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
